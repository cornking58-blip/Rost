<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МВЗ-13 Елизаветино — Агродашборд 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #0a0f0d;
  --surface: #111a14;
  --surface2: #162019;
  --surface3: #1c2a20;
  --border: #1f3026;
  --accent: #6abf4b;
  --accent2: #86efac;
  --muted: #4d6b56;
  --text: #d4edda;
  --textmuted: #6b8f73;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  background: var(--surface);
}
.header-logos { display: flex; align-items: center; gap: 20px; }
.logo-aeg img { height: 44px; width: auto; }
.logo-divider { width: 1px; height: 36px; background: var(--border); }
.logo-baikov {
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  padding: 6px 14px;
  font-family: 'Unbounded', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.logo-baikov span { opacity: 0.55; font-weight: 300; }
.header-title { flex: 1; text-align: center; }
.header-title h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.01em;
}
.header-title .subtitle { font-size: 10px; color: var(--textmuted); margin-top: 3px; letter-spacing: 0.06em; }

/* STATS */
.stats-row {
  display: flex; gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-card { flex: 1; background: var(--surface); padding: 12px 18px; }
.stat-label { font-size: 9px; color: var(--textmuted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 600; color: var(--accent); }
.stat-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }

/* LAYOUT */
.main { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 140px); }

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  overflow-y: auto;
  max-height: calc(100vh - 140px);
  position: sticky; top: 0;
}
.sidebar-section { padding: 0 14px; margin-bottom: 20px; }
.sidebar-title {
  font-size: 9px; font-weight: 500; color: var(--textmuted);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.toggle-all-btn {
  font-size: 9px; color: var(--accent); background: none; border: none;
  cursor: pointer; font-family: inherit; letter-spacing: 0.05em;
  padding: 0; transition: opacity 0.15s;
}
.toggle-all-btn:hover { opacity: 0.7; }

/* Filter buttons — much more visible */
.filter-btn {
  display: flex; align-items: center; gap: 7px; width: 100%;
  padding: 7px 9px; border-radius: 5px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  text-align: left; transition: all 0.15s; margin-bottom: 3px;
  border: 1.5px solid transparent;
  background: var(--surface2); color: var(--textmuted);
}
.filter-btn.active {
  border-color: var(--dot-color, #6abf4b);
  background: color-mix(in srgb, var(--dot-color, #6abf4b) 12%, var(--surface2));
  color: var(--text);
}
.filter-btn:hover { background: var(--surface3); color: var(--text); }
.filter-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; background: var(--dot-color, #888); }
.filter-count { margin-left: auto; font-size: 9px; color: var(--muted); }

.search-bar {
  width: 100%; padding: 7px 10px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 5px; color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  outline: none; transition: border-color 0.15s;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: var(--muted); }

/* CONTENT */
.content { padding: 20px; overflow: auto; }
.tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.tab {
  padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  background: transparent; border: none; color: var(--textmuted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.view { display: none; }
.view.active { display: block; }

/* === GANTT === */
.gantt-controls {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
}
.gantt-month-btn {
  padding: 5px 11px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--textmuted); cursor: pointer; border-radius: 4px;
  transition: all 0.15s;
}
.gantt-month-btn:hover { border-color: var(--muted); color: var(--text); }
.gantt-month-btn.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--surface2)); }
.gantt-all-btn {
  padding: 5px 11px; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: transparent; border: 1.5px solid var(--border);
  color: var(--textmuted); cursor: pointer; border-radius: 4px;
  margin-left: auto; transition: all 0.15s;
}
.gantt-all-btn.active { border-color: var(--accent); color: var(--accent); }
.gantt-all-btn:hover { border-color: var(--muted); color: var(--text); }

.gantt-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); }
.gantt-header { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.gantt-label-col { min-width: 280px; max-width: 280px; padding: 9px 14px; font-size: 9px; color: var(--textmuted); letter-spacing: 0.1em; text-transform: uppercase; border-right: 1px solid var(--border); }
.gantt-months { flex: 1; display: flex; }
.gantt-month { border-right: 1px solid var(--border); padding: 9px 6px; font-size: 9px; color: var(--textmuted); text-align: center; white-space: nowrap; }
.gantt-month.current { color: var(--accent); }
.gantt-row { display: flex; border-bottom: 1px solid var(--border); min-height: 32px; align-items: center; transition: background 0.1s; }
.gantt-row:hover { background: var(--surface2); }
.gantt-row-label { min-width: 280px; max-width: 280px; padding: 5px 14px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 1px; }
.gantt-row-op { font-size: 10px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-row-culture { font-size: 9px; color: var(--textmuted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-timeline { flex: 1; position: relative; height: 32px; }
.gantt-bar {
  position: absolute; height: 16px; top: 8px; border-radius: 3px;
  opacity: 0.85; transition: opacity 0.15s, transform 0.15s;
  cursor: pointer; min-width: 3px;
}
.gantt-bar:hover { opacity: 1; transform: scaleY(1.2); z-index: 2; }
.gantt-group-header { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border); min-height: 24px; align-items: center; }
.gantt-group-label { min-width: 280px; max-width: 280px; padding: 3px 14px; font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; border-right: 1px solid var(--border); }
.gantt-group-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; }

/* Today marker */
.today-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #ef4444; opacity: 0.5; z-index: 5; pointer-events: none; }

/* === PESTICIDE VIEW === */
.pest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.pest-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.15s;
}
.pest-card:hover { transform: translateY(-1px); }
.pest-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.pest-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
.pest-card-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; }
.pest-type-badge { font-size: 8px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
.pest-card-culture { font-size: 10px; margin-bottom: 12px; }
.pest-timeline-mini { height: 6px; background: var(--surface2); border-radius: 3px; margin-bottom: 10px; position: relative; overflow: hidden; }
.pest-bar-mini { position: absolute; height: 100%; border-radius: 3px; }
.pest-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--textmuted); }
.pest-meta strong { color: var(--text); }
.pest-machine { font-size: 9px; color: var(--textmuted); margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }

/* === CALENDAR === */
.calendar-controls { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.cal-nav {
  background: var(--surface); border: 1.5px solid var(--border); color: var(--text);
  padding: 6px 14px; border-radius: 4px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; transition: all 0.15s;
}
.cal-nav:hover { border-color: var(--accent); color: var(--accent); }
.cal-month-label { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 600; color: var(--accent); flex: 1; text-align: center; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-header { padding: 6px; text-align: center; font-size: 9px; color: var(--textmuted); letter-spacing: 0.1em; text-transform: uppercase; }
.cal-day { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; min-height: 90px; padding: 5px; transition: border-color 0.15s; }
.cal-day:hover { border-color: var(--muted); }
.cal-day.other-month { opacity: 0.25; }
.cal-day.has-events { border-color: var(--surface3); }
.cal-day-num { font-size: 10px; color: var(--textmuted); margin-bottom: 3px; font-weight: 500; }
.cal-day.has-events .cal-day-num { color: var(--accent); }
.cal-event {
  font-size: 8px; padding: 2px 5px; border-radius: 2px; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;
  cursor: pointer; transition: opacity 0.1s;
}
.cal-event:hover { opacity: 0.85; }
.cal-more { font-size: 8px; color: var(--textmuted); padding: 1px 2px; }

/* === TOOLTIP === */
.tooltip {
  position: fixed; background: #071009;
  border: 1px solid var(--accent); border-radius: 8px;
  padding: 12px 16px; font-size: 11px; pointer-events: none;
  z-index: 9999; min-width: 220px; max-width: 300px; display: none;
  box-shadow: 0 12px 32px rgba(0,0,0,0.7);
}
.tooltip-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 10px; line-height: 1.3; }
.tooltip-row { display: flex; justify-content: space-between; gap: 14px; margin-bottom: 4px; color: var(--textmuted); font-size: 10px; }
.tooltip-row span:last-child { color: var(--text); text-align: right; max-width: 160px; }
.tooltip-sep { height: 1px; background: var(--border); margin: 6px 0; }

/* LEGEND */
.legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; background: var(--surface); border-top: 1px solid var(--border); }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: var(--textmuted); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: var(--textmuted); font-size: 12px; }
</style>
</head>

let ganttMonth = null; // null = all months

// === DATE HELPERS ===
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }

// For gantt: either full year view or single-month view
function getGanttRange() {
  if (ganttMonth === null) {
    return { start: new Date(2026,3,1), end: new Date(2026,11,31) };
  }
  return { start: new Date(YEAR, ganttMonth, 1), end: new Date(YEAR, ganttMonth+1, 0) };
}

function barGeometry(recStart, recEnd, rangeStart, rangeEnd) {
  const total = daysBetween(rangeStart, rangeEnd) + 1;
  const s = new Date(recStart), e = new Date(recEnd);
  const clampS = s < rangeStart ? rangeStart : s;
  const clampE = e > rangeEnd ? rangeEnd : e;
  if (clampS > rangeEnd || clampE < rangeStart) return null;
  const left = daysBetween(rangeStart, clampS) / total * 100;
  const width = Math.max(0.4, (daysBetween(clampS, clampE) + 1) / total * 100);
  return { left: left.toFixed(3)+'%', width: width.toFixed(3)+'%' };
}

  const ops_unique = new Set(RAW_DATA.map(r=>r.op)).size;

  const cultures = new Set(RAW_DATA.map(r=>r.culture)).size;

}

function buildFilters() {
  const cultures = [...new Set(RAW_DATA.map(r=>r.culture))].sort();
  const cats = [...new Set(RAW_DATA.map(r=>r.category))].sort();
  document.getElementById('cultureFilters').innerHTML = cultures.map(c=>{
    const cnt = RAW_DATA.filter(r=>r.culture===c).length;
    const col = CULTURE_COLORS[c]||'#888';
    return `<button class="filter-btn active" style="--dot-color:${col}" data-type="culture" data-value="${c}" onclick="toggleFilter('culture','${c}',this)">
      <span class="filter-dot"></span>${c.replace(/ 20\d\d/,'')} <span class="filter-count">${cnt}</span></button>`;
  }).join('');
  document.getElementById('categoryFilters').innerHTML = cats.map(c=>{
    const cnt = RAW_DATA.filter(r=>r.category===c).length;
    const col = CAT_COLORS[c]||'#888';
    return `<button class="filter-btn active" style="--dot-color:${col}" data-type="category" data-value="${c}" onclick="toggleFilter('category','${c}',this)">
      <span class="filter-dot"></span>${c} <span class="filter-count">${cnt}</span></button>`;
  }).join('');
}

function buildLegend() {
  document.getElementById('legend').innerHTML =
    Object.entries(CULTURE_COLORS).map(([c,col])=>`<div class="legend-item"><div class="legend-dot" style="background:${col}"></div>${c}</div>`).join('')+'<div style="flex:1"></div>'+
    Object.entries(CAT_COLORS).filter(([c])=>PESTICIDE_CATS.has(c)).map(([c,col])=>`<div class="legend-item"><div class="legend-dot" style="background:${col};border-radius:2px"></div>${c}</div>`).join('');
}

function buildGanttMonthBtns() {
  const btns = document.getElementById('ganttMonthBtns');
  let html = `<button class="gantt-all-btn active" id="ganttBtnAll" onclick="setGanttMonth(null,this)">Все месяцы</button>`;
  PROJ_MONTHS.forEach(m=>{
    html += `<button class="gantt-month-btn" id="ganttBtn${m}" onclick="setGanttMonth(${m},this)">${MONTH_SHORT[m]}</button>`;
  });
  btns.innerHTML = html;
}

function setGanttMonth(m, btn) {
  ganttMonth = m;
  document.querySelectorAll('.gantt-month-btn, .gantt-all-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function toggleFilter(type, value, btn) {
  const set = type==='culture' ? selectedCultures : selectedCategories;
  if (set.has(value)) { set.delete(value); btn.classList.remove('active'); }
  else { set.add(value); btn.classList.add('active'); }
  applyFilters();
}

function toggleAll(type) {
  const selector = type==='culture' ? '[data-type="culture"]' : '[data-type="category"]';
  const set = type==='culture' ? selectedCultures : selectedCategories;
  const btns = document.querySelectorAll(selector);
  const allActive = [...btns].every(b=>b.classList.contains('active'));
  btns.forEach(b=>{
    const v = b.dataset.value;
    if (allActive) { set.delete(v); b.classList.remove('active'); }
    else { set.add(v); b.classList.add('active'); }
  });
  applyFilters();
}

function getFiltered() {
  return RAW_DATA.filter(r=>{
    if (selectedCultures.size && !selectedCultures.has(r.culture)) return false;
    if (selectedCategories.size && !selectedCategories.has(r.category)) return false;
    if (searchText && !r.op.toLowerCase().includes(searchText) && !r.culture.toLowerCase().includes(searchText)) return false;
    return true;
  });
}

function applyFilters() {
  searchText = document.getElementById('searchInput').value.toLowerCase();
  const filtered = getFiltered();
  buildGantt(filtered);
  buildPesticideView(filtered);
}

// ===== GANTT =====
function buildGantt(data) {
  const {start: rangeStart, end: rangeEnd} = getGanttRange();
  const totalDays = daysBetween(rangeStart, rangeEnd) + 1;

  // Build month header spans within range
  let monthHeaders = '';
  let d = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
  while (d <= rangeEnd) {
    const mEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const visStart = d < rangeStart ? rangeStart : d;
    const visEnd = mEnd > rangeEnd ? rangeEnd : mEnd;
    const days = daysBetween(visStart, visEnd) + 1;
    const w = (days / totalDays * 100).toFixed(2)+'%';
    monthHeaders += `<div class="gantt-month" style="width:${w};flex:none">${MONTH_SHORT[d.getMonth()]}</div>`;
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  // Filter data to range
  const inRange = data.filter(r=>{
    const s = new Date(r.start), e = new Date(r.end);
    return s <= rangeEnd && e >= rangeStart;
  });

  const catOrder = ['Гербициды','Фунгициды','Инсектициды','Глифосат','Десикация','Противозлак.','Опрыскивание','Сев','Уборка','Удобрения','Почвообработка','Логистика','Прочее'];
  const byCategory = {};
  inRange.forEach(r=>{ if (!byCategory[r.category]) byCategory[r.category]=[]; byCategory[r.category].push(r); });

  let rowsHtml = '';
  for (const cat of catOrder) {
    if (!byCategory[cat]) continue;
    const catColor = CAT_COLORS[cat]||'#888';
    rowsHtml += `<div class="gantt-group-header">
      <div class="gantt-group-label" style="color:${catColor}">${cat}</div>
      <div class="gantt-group-line"></div>
    </div>`;
    byCategory[cat].forEach((r,i)=>{
      const geo = barGeometry(r.start, r.end, rangeStart, rangeEnd);
      if (!geo) return;
      const barColor = CULTURE_COLORS[r.culture]||'#4ade80';
      const isPest = PESTICIDE_CATS.has(r.category);
      const border = isPest ? `border:1.5px solid ${catColor};` : '';
      const rj = JSON.stringify(r).replace(/'/g,"\\'").replace(/"/g,'&quot;');
      rowsHtml += `<div class="gantt-row">
        <div class="gantt-row-label">
          <div class="gantt-row-op">${r.op}</div>
          <div class="gantt-row-culture">${r.culture} · ${r.machine.split(' гос.')[0].substring(0,22)}</div>
        </div>
        <div class="gantt-timeline">
          <div class="gantt-bar" style="left:${geo.left};width:${geo.width};background:${barColor};${border}"
            onmouseover="showTip(event,'${rj.replace(/&quot;/g,'"')}')" onmouseout="hideTip()"></div>
        </div>
      </div>`;
    });
  }

  if (!rowsHtml) rowsHtml = `<div style="padding:40px;text-align:center;color:var(--textmuted);font-size:12px">Нет данных по выбранным фильтрам</div>`;

  document.getElementById('ganttContainer').innerHTML = `
    <div class="gantt-header">
      <div class="gantt-label-col">Операция / Техника</div>
      <div class="gantt-months">${monthHeaders}</div>
    </div>${rowsHtml}`;
}

  let r;
  try { r = JSON.parse(rJson); } catch(e) { return; }
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `
    <div class="tooltip-title">${r.op}</div>
    <div class="tooltip-row"><span>Культура</span><span style="color:${CULTURE_COLORS[r.culture]||'#fff'}">${r.culture}</span></div>
    <div class="tooltip-sep"></div>
    <div class="tooltip-row"><span>Техника</span><span>${r.machine.split(' гос.')[0]}</span></div>
    <div class="tooltip-row"><span>Тип</span><span>${r.tech_type.replace(/_/g,' ')}</span></div>
    <div class="tooltip-sep"></div>
    <div class="tooltip-row"><span>Начало</span><span>${r.start}</span></div>
    <div class="tooltip-row"><span>Конец</span><span>${r.end}</span></div>
    <div class="tooltip-row"><span>Кол-во дней</span><span>${r.days}</span></div>
    ${r.done>0?`<div class="tooltip-row"><span>Выработка</span><span>${r.done} га/ед.</span></div>`:''}
    <div class="tooltip-sep"></div>
    <div class="tooltip-row"><span>Категория</span><span style="color:${CAT_COLORS[r.category]||'#888'}">${r.category}</span></div>
  `;
  tip.style.display = 'block';
  positionTip(event);
}
function positionTip(e) {
  const tip = document.getElementById('tooltip');
  let x = e.clientX+18, y = e.clientY+14;
  if (x+310>window.innerWidth) x = e.clientX-326;
  if (y+260>window.innerHeight) y = e.clientY-260;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}
document.addEventListener('mousemove', e=>{ if(document.getElementById('tooltip').style.display==='block') positionTip(e); });
function hideTip() { document.getElementById('tooltip').style.display='none'; }

// ===== PESTICIDE VIEW =====
function buildPesticideView(data) {
  const pest = data.filter(r=>PESTICIDE_CATS.has(r.category));
  if (!pest.length) {
    document.getElementById('pesticideGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div style="font-size:36px;margin-bottom:12px">🌿</div>Нет операций по выбранным фильтрам</div>`;
    return;
  }
  const RS = new Date(2026,3,1), RE = new Date(2026,11,31);
  const total = daysBetween(RS,RE)+1;
  document.getElementById('pesticideGrid').innerHTML = pest.map(r=>{
    const color = CAT_COLORS[r.category]||'#888';
    const cColor = CULTURE_COLORS[r.culture]||'#888';
    const s = new Date(r.start);
    const leftP = (Math.max(0,daysBetween(RS,s))/total*100).toFixed(1);
    const wP = Math.max(0.5, (r.days/total*100)).toFixed(1);
    return `<div class="pest-card" style="border-color:${color}33">
      <div class="pest-top-bar" style="background:${color}"></div>
      <div class="pest-card-header">
        <div class="pest-card-title">${r.op}</div>
        <div class="pest-type-badge" style="background:${color}22;color:${color}">${r.category}</div>
      </div>
      <div class="pest-card-culture" style="color:${cColor}">${r.culture}</div>
      <div class="pest-timeline-mini">
        <div class="pest-bar-mini" style="left:${leftP}%;width:${wP}%;background:${color}"></div>
      </div>
      <div class="pest-meta">
        <div><strong>${r.start}</strong> — <strong>${r.end}</strong></div>
        <div><strong>${r.days}</strong> дней</div>
      </div>
      <div class="pest-machine">🚜 ${r.machine||'—'}</div>
    </div>`;
  }).join('');
}

// ===== CALENDAR =====
function buildCalendar() {
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES_RU[month]} ${year}`;

  const firstDay = new Date(year, month, 1);
  let startDow = firstDay.getDay();
  startDow = startDow===0 ? 6 : startDow-1; // Mon=0
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();

  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month+1, 0);

  // All events overlapping this month
  const events = RAW_DATA.filter(r=>{
    const s = new Date(r.start), e = new Date(r.end);
    return s <= monthEnd && e >= monthStart;
  });

  let html = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="cal-day-header">${d}</div>`).join('');

  // Prev month padding
  for (let i=startDow-1; i>=0; i--) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${prevMonthDays-i}</div></div>`;
  }

  for (let day=1; day<=daysInMonth; day++) {
    const date = new Date(year, month, day);
    const dayEvts = events.filter(r=>{
      const s = new Date(r.start), e = new Date(r.end);
      return s <= date && e >= date;
    });
    const hasEvts = dayEvts.length > 0;

    // Build all event pills (no limit — scrollable)
    const evHtml = dayEvts.map(r=>{
      const color = CAT_COLORS[r.category]||CULTURE_COLORS[r.culture]||'#888';
      const rj = JSON.stringify(r).replace(/'/g,"\\'").replace(/"/g,"&quot;");
      const shortName = r.op.length>18 ? r.op.substring(0,16)+'…' : r.op;
      return `<div class="cal-event" style="background:${color}99;border-left:2px solid ${color}"
        onmouseover="showTip(event,'${rj.replace(/&quot;/g,'"')}')" onmouseout="hideTip()"
        title="${r.op}">${shortName}</div>`;
    }).join('');

    html += `<div class="cal-day ${hasEvts?'has-events':''}" style="${hasEvts?'overflow-y:auto;max-height:120px':''}">
      <div class="cal-day-num">${day}</div>
      ${evHtml}
    </div>`;
  }

  // Fill rest
  const totalCells = Math.ceil((startDow+daysInMonth)/7)*7;
  for (let i=1; i<=totalCells-startDow-daysInMonth; i++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  document.getElementById('calendarGrid').innerHTML = html;
}

function prevMonth() { calendarMonth.setMonth(calendarMonth.getMonth()-1); buildCalendar(); }
function nextMonth() { calendarMonth.setMonth(calendarMonth.getMonth()+1); buildCalendar(); }

function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
}

document.addEventListener('DOMContentLoaded', init);
</script>
